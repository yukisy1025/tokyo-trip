<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#b3322c">
<title>東京・日光・箱根 家族旅行</title>
<style>
:root{
  --red:#b3322c; --red-d:#8c2420; --indigo:#27355e; --indigo-l:#3a4d80;
  --gold:#c79a3d; --cream:#fbf7f0; --paper:#ffffff; --ink:#2b2b2b;
  --muted:#7a7268; --line:#eadfd0; --green:#3f7d5e; --sky:#2f6fb0;
  --shadow:0 4px 16px rgba(40,30,20,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:var(--cream); color:var(--ink); line-height:1.65; font-size:15.5px;
  -webkit-font-smoothing:antialiased; padding-bottom:calc(100px + env(safe-area-inset-bottom));
}
.app{max-width:480px;margin:0 auto;background:var(--cream);min-height:100vh;position:relative}

/* Header */
header{
  background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-l) 55%,var(--red) 130%);
  color:#fff;padding:22px 18px 18px;position:relative;overflow:hidden;
}
header::after{content:"🍁";position:absolute;right:-6px;top:-8px;font-size:84px;opacity:.18;transform:rotate(18deg)}
header::before{content:"⛩️";position:absolute;left:-10px;bottom:-18px;font-size:70px;opacity:.13}
header h1{font-size:21px;font-weight:800;letter-spacing:.5px;position:relative;z-index:1}
header .sub{font-size:13px;opacity:.92;margin-top:5px;position:relative;z-index:1}
header .meta{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;position:relative;z-index:1}
header .chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;backdrop-filter:blur(4px)}

/* Tab content */
main{padding:14px 14px 24px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Hint */
.hint{background:#eef1f7;border-radius:12px;padding:9px 13px;font-size:12.5px;color:var(--indigo);
  margin-bottom:10px;line-height:1.5}

/* Day pills */
.daybar{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 12px;scrollbar-width:none}
.daybar::-webkit-scrollbar{display:none}
.daypill{flex:0 0 auto;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;
  padding:8px 13px;text-align:center;min-width:66px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.daypill .d{font-size:11px;color:var(--muted);font-weight:700}
.daypill .n{font-size:15px;font-weight:800;color:var(--indigo);line-height:1.15;margin-top:1px}
.daypill.active{background:var(--red);border-color:var(--red)}
.daypill.active .d,.daypill.active .n{color:#fff}

/* Day header card */
.dayhead{background:linear-gradient(120deg,var(--indigo),var(--indigo-l));color:#fff;border-radius:16px;
  padding:15px 16px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.dayhead .emoji{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.22}
.dayhead .t{font-size:17.5px;font-weight:800;position:relative;z-index:1;padding-right:44px}
.dayhead .dt{font-size:12.5px;opacity:.88;margin-top:2px}
.dayhead .stay{margin-top:9px;font-size:12px;background:rgba(255,255,255,.16);display:inline-block;
  padding:4px 11px;border-radius:13px}

/* Timeline */
.tl{position:relative;padding-left:6px}
.item{position:relative;padding:0 0 4px 58px;margin-bottom:11px}
.item::before{content:"";position:absolute;left:48px;top:7px;bottom:-11px;width:2px;background:var(--line)}
.item:last-child::before{display:none}
.item .time{position:absolute;left:0;top:3px;width:44px;text-align:right;font-size:12px;
  font-weight:800;color:var(--red)}
.item .dot{position:absolute;left:44px;top:6px;width:11px;height:11px;border-radius:50%;
  background:var(--red);border:2.5px solid var(--cream);box-shadow:0 0 0 1.5px var(--red)}
.item .body{background:var(--paper);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow);
  border:1px solid var(--line)}
.item .txt{font-size:14.5px;font-weight:600}
.item .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.maps{display:inline-flex;align-items:center;gap:5px;margin-top:9px;background:var(--sky);color:#fff;
  text-decoration:none;font-size:13px;font-weight:700;padding:8px 15px;border-radius:20px}
.maps:active{background:#245a92}

/* Note box */
.note{background:#fff6ea;border:1px solid #f0dcb8;border-left:4px solid var(--gold);border-radius:10px;
  padding:11px 13px;margin:12px 0;font-size:13px;color:#6b5836;line-height:1.6}
.note b{color:var(--red-d)}
.note .h{font-weight:800;margin-bottom:4px;display:block;color:var(--gold);font-size:13.5px}
.note.warn{background:#fdeeed;border-color:#f3c9c5;border-left-color:var(--red);color:#7a3530}
.note.warn .h{color:var(--red)}

/* Cost bar */
.cost{display:flex;justify-content:space-between;align-items:center;background:var(--indigo);
  color:#fff;border-radius:12px;padding:11px 15px;margin-top:12px;font-size:13px;gap:8px}
.cost .v{font-weight:800;font-size:15px;text-align:right}

/* Generic cards */
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:15px 16px;
  margin-bottom:13px;box-shadow:var(--shadow)}
.card h3{font-size:16px;color:var(--indigo);display:flex;align-items:center;gap:7px;margin-bottom:9px}
.card h3 .ic{font-size:19px}
.card .addr{font-size:12.5px;color:var(--muted);margin:3px 0 8px}
.row{display:flex;gap:9px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line)}
.row:last-child{border-bottom:none}
.row .k{flex:0 0 82px;color:var(--muted);font-weight:600;font-size:12.5px}
.row .v{flex:1}
.tag{display:inline-block;background:#eef1f7;color:var(--indigo);font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:10px;margin:2px 3px 2px 0}
.tag.g{background:#e8f3ec;color:var(--green)}
.tag.r{background:#fae9e8;color:var(--red)}

/* Checklist */
.chk{display:flex;align-items:flex-start;gap:10px;padding:9px 0;font-size:14px;border-bottom:1px dashed var(--line)}
.chk:last-child{border:none}
.chk input{appearance:none;width:22px;height:22px;border:2px solid var(--gold);border-radius:6px;
  flex:0 0 auto;margin-top:1px;cursor:pointer;position:relative;transition:.15s}
.chk input:checked{background:var(--green);border-color:var(--green)}
.chk input:checked::after{content:"✓";position:absolute;color:#fff;font-size:15px;font-weight:900;
  left:4px;top:-2px}
.chk label{cursor:pointer;flex:1}
.chk input:checked + label{color:var(--muted);text-decoration:line-through}

/* Budget */
.btable{width:100%;border-collapse:collapse;font-size:13px}
.btable td{padding:9px 6px;border-bottom:1px solid var(--line)}
.btable td:last-child{text-align:right;font-weight:700;color:var(--indigo);white-space:nowrap}
.btable tr.sum td{background:#eef1f7;font-weight:800;color:var(--indigo)}
.btable tr.grand td{background:var(--red);color:#fff;font-weight:800;font-size:14px}
.btable tr.brow{cursor:pointer}
.btable tr.brow td:first-child{color:var(--indigo);font-weight:600}
.btable tr.brow .caret{color:var(--gold);font-weight:900;margin-right:6px;font-size:11px}
.btable tr.bdetail{display:none}
.btable tr.bdetail.open{display:table-row}
.btable tr.bdetail td{background:#fff6ea;font-size:12px;color:#6b5836;padding:6px 10px 10px;text-align:left}
.btable tr.bdetail ul{margin:0;padding-left:18px}
.btable tr.bdetail li{margin:3px 0;line-height:1.5}
.bigfig{text-align:center;background:linear-gradient(120deg,var(--indigo),var(--red));color:#fff;
  border-radius:16px;padding:17px;margin-bottom:14px;box-shadow:var(--shadow)}
.bigfig .lab{font-size:12.5px;opacity:.88}
.bigfig .num{font-size:28px;font-weight:900;margin-top:2px}
.bigfig .per{font-size:12.5px;opacity:.88;margin-top:3px}

/* Converter */
.exchrow{display:flex;align-items:center;gap:10px;margin:14px 0}
.exchrow label{flex:0 0 70px;font-weight:800;color:var(--indigo);font-size:15px;display:flex;align-items:center;gap:5px}
.exchrow input{flex:1;min-width:0;font-size:24px;font-weight:800;color:var(--ink);border:2px solid var(--line);
  border-radius:12px;padding:13px 14px;text-align:right;font-family:inherit;background:var(--paper)}
.exchrow input:focus{outline:none;border-color:var(--red)}
.exchrow .unit{flex:0 0 auto;font-size:15px;font-weight:700;color:var(--muted)}
.eqbtn{display:inline-block;background:var(--cream);border:1px solid var(--line);border-radius:10px;
  padding:7px 11px;margin:4px 5px 4px 0;font-size:12.5px;font-weight:700;color:var(--indigo)}

.sectitle{font-size:13.5px;font-weight:800;color:var(--red);margin:4px 2px 10px;display:flex;align-items:center;gap:6px}
.sectitle::before{content:"";width:4px;height:16px;background:var(--red);border-radius:3px}

/* Bottom nav */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);
  display:flex;padding:7px 2px calc(9px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(40,30,20,.08);z-index:50}
.tab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 1px;cursor:pointer;color:var(--muted);font-family:inherit}
.tab .ti{font-size:21px;line-height:1}
.tab .tt{font-size:10px;font-weight:700;white-space:nowrap}
.tab.active{color:var(--red)}
.tab.active .ti{transform:translateY(-1px)}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>🇯🇵 東京・日光・箱根 家族旅行</h1>
  <div class="sub">2026年11月29日（日）～12月7日（一）・9天8夜・家族4人</div>
  <div class="meta">
    <span class="chip">✈️ 捷星航空 高雄⇄成田</span>
    <span class="chip">👨‍👩‍👧‍👦 財・燕・亞・安</span>
    <span class="chip">💴 100円≈20元</span>
  </div>
</header>

<main>
  <!-- ===== 行程 ===== -->
  <section class="view active" id="v-trip">
    <div class="hint">👇 點下方<b>日期</b>切換每一天的行程；點藍色 <b>「📍 導航」</b> 按鈕，手機會直接打開 Google 地圖帶路。</div>
    <div class="daybar" id="daybar"></div>
    <div id="dayContent"></div>
  </section>

  <!-- ===== 交通 ===== -->
  <section class="view" id="v-transport"></section>

  <!-- ===== 住宿 ===== -->
  <section class="view" id="v-stay"></section>

  <!-- ===== 行李 ===== -->
  <section class="view" id="v-pack"></section>

  <!-- ===== 預算 ===== -->
  <section class="view" id="v-budget"></section>

  <!-- ===== 換算 ===== -->
  <section class="view" id="v-exch"></section>
</main>

<nav>
  <button class="tab active" data-v="trip"><span class="ti">🗓️</span><span class="tt">每日行程</span></button>
  <button class="tab" data-v="transport"><span class="ti">🚄</span><span class="tt">交通</span></button>
  <button class="tab" data-v="stay"><span class="ti">🏨</span><span class="tt">住宿</span></button>
  <button class="tab" data-v="pack"><span class="ti">🎒</span><span class="tt">行李</span></button>
  <button class="tab" data-v="budget"><span class="ti">💰</span><span class="tt">預算</span></button>
  <button class="tab" data-v="exch"><span class="ti">💱</span><span class="tt">換算</span></button>
</nav>
</div>

const daybar = document.getElementById('daybar');
const dayContent = document.getElementById('dayContent');
days.forEach((d,i)=>{
  const p=document.createElement('div');
  p.className='daypill'+(i===0?' active':'');
  p.innerHTML=`<div class="d">${d.date}</div><div class="n">第${d.n}天</div>`;
  p.onclick=()=>{document.querySelectorAll('.daypill').forEach(e=>e.classList.remove('active'));
    p.classList.add('active');renderDay(i);p.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'})};
  daybar.appendChild(p);
});
function renderDay(i){
  const d=days[i];
  let h=`<div class="dayhead"><span class="emoji">${d.emoji}</span>
    <div class="t">第 ${d.n} 天｜${d.title}</div>
    <div class="dt">${d.date}（${["日","一","二","三","四","五","六","日","一"][i]}）</div>
    <div class="stay">🏨 住宿：${d.stay}</div></div>`;
  if(d.warn) h+=`<div class="note warn"><span class="h">⚠️ 待確認</span>${d.warn}</div>`;
  h+=`<div class="tl">`;
  d.items.forEach(it=>{
    h+=`<div class="item"><div class="time">${it.t}</div><div class="dot"></div>
      <div class="body"><div class="txt">${it.x}</div>
      ${it.s?`<div class="sub">${it.s}</div>`:''}
      ${it.m?mapBtn(it.m):''}</div></div>`;
  });
  h+=`</div>`;
  if(d.note) h+=`<div class="note"><span class="h">${d.note.h}</span>${d.note.b}
    ${d.note.mq?'<br>'+mapBtn(d.note.mq):''}</div>`;
  h+=`<div class="cost"><span>💴 當日預估花費</span><span class="v">${d.cost}</span></div>`;
  dayContent.innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}
renderDay(0);

document.getElementById('v-exch').innerHTML=`
<div class="card"><h3><span class="ic">💱</span>日幣 ⇄ 台幣 換算</h3>
<div class="addr">匯率：台幣 1 ： 日幣 5（家庭自訂）</div>
<div class="exchrow"><label>🇯🇵 日幣</label><input id="ex_jpy" type="text" inputmode="numeric" placeholder="0"><span class="unit">円</span></div>
<div class="exchrow"><label>🇹🇼 台幣</label><input id="ex_twd" type="text" inputmode="numeric" placeholder="0"><span class="unit">元</span></div>
</div>
<div class="note"><span class="h">使用方式</span>在任一欄輸入數字，另一欄會自動換算。<br>台幣 ＝ 日幣 ÷ 5　／　日幣 ＝ 台幣 × 5</div>
<div class="card"><h3><span class="ic">📌</span>快速對照</h3>
<span class="eqbtn">¥1,000 ＝ NT$200</span><span class="eqbtn">¥5,000 ＝ NT$1,000</span>
<span class="eqbtn">¥10,000 ＝ NT$2,000</span><span class="eqbtn">¥30,000 ＝ NT$6,000</span>
<span class="eqbtn">NT$1,000 ＝ ¥5,000</span><span class="eqbtn">NT$5,000 ＝ ¥25,000</span>
</div>`;
(function(){
  const jpy=document.getElementById('ex_jpy'), twd=document.getElementById('ex_twd');
  const fmt=n=>n.toLocaleString('en-US');
  const num=s=>parseFloat(String(s).replace(/[^0-9.]/g,''));
  jpy.addEventListener('input',()=>{const v=num(jpy.value);twd.value=isNaN(v)?'':fmt(Math.round(v/5));});
  twd.addEventListener('input',()=>{const v=num(twd.value);jpy.value=isNaN(v)?'':fmt(Math.round(v*5));});
})();
